name: Publish to npm

# Publishes to npm via Trusted Publishing (OIDC) — NO stored token. GitHub Actions
# authenticates to npm over OIDC, so there is nothing to rotate (classic tokens are
# deprecated; granular tokens force ≤90-day expiry — OIDC avoids both). Provenance
# is attached automatically.
#
# ONE-TIME setup on npm (after the package's first publish exists):
#   npmjs.com → intercomm-aimfp → Settings → Trusted Publisher → GitHub Actions:
#     organization/user: aryanduntley
#     repository:        InterCommAIMFP
#     workflow:          publish.yml
#     environment:       (leave blank)
#
# On push to main, build and publish IF package.json's version is new (idempotent —
# re-running on an unchanged version is a no-op).

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm >= 11.5.1. Node 24 ships npm 11.x, but pin
      # latest so this can't silently fall behind the OIDC requirement.
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest

      # --ignore-scripts skips better-sqlite3's native build — only the type
      # packages are needed to run tsc, and the published artifact ships dist/ +
      # system-prompt.md (the consumer's npm/npx compiles better-sqlite3 natively
      # at install time).
      - name: Install (types only, skip native builds)
        run: npm install --ignore-scripts

      - name: Build
        run: npm run build

      - name: Publish if version is new
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "intercomm-aimfp@$VERSION" version >/dev/null 2>&1; then
            echo "intercomm-aimfp@$VERSION already on npm — nothing to publish."
          else
            echo "Publishing intercomm-aimfp@$VERSION via OIDC trusted publishing..."
            npm publish
          fi
